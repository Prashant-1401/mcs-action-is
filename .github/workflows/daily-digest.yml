name: Daily Pending Action Digest

on:
  schedule:
    - cron: '30 2 * * *'  # 8:00 AM IST (2:30 AM UTC)
  workflow_dispatch:        # Allow manual trigger from Actions tab

jobs:
  send-digest:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Render cold start
        run: sleep 10

      - name: Send daily digest
        run: |
          response=$(curl -s -w "\n%{http_code}" -X POST \
            "https://mcs-action-is-1.onrender.com/api/actions/send-daily-digests" \
            -H "Content-Type: application/json" \
            -H "x-api-key: ${{ secrets.MCS_API_KEY }}" \
            -d '{}')
          
          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | head -n-1)
          
          echo "HTTP Status: $http_code"
          echo "Response: $body"
          
          if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
            echo "ERROR: Daily digest failed with status $http_code"
            exit 1
          fi

          queued=$(echo "$body" | grep -o '"queued":[0-9]*' | grep -o '[0-9]*')
          echo "Queued $queued digest email(s)"
